name: creator-agent-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --check src/server.js
      - run: node --check src/agent_runtime.js
      - run: node --check src/content_packs.js
      - run: node --check src/generic_pipeline.js
      - run: node --check public/app.js
      - run: node scripts/validate_codex_plugins.mjs
