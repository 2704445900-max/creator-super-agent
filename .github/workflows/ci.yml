name: creator-agent-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check every JavaScript module
        shell: bash
        run: |
          find src -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          find scripts -type f -name '*.mjs' -print0 | xargs -0 -n1 node --check
          node --check public/app.js
      - run: node scripts/validate_codex_plugins.mjs
